apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "env-inspector.fullname" . }}

  labels:
    {{- include "env-inspector.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "env-inspector.name" . }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "env-inspector.name" . }}

    spec:
      terminationGracePeriodSeconds: 30

      serviceAccountName: {{ include "env-inspector.fullname" . }}

      containers:
      - name: env-inspector

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - name: http
          containerPort: 8080

        envFrom:
        - configMapRef:
            name: {{ include "env-inspector.fullname" . }}

        readinessProbe:
          httpGet:
            path: /health
            port: 8080

          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8080

          initialDelaySeconds: 10
          periodSeconds: 15

        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}

          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}