apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: env-inspector
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/x-akumar/platform-infra.git
    targetRevision: main
    path: app/helm/env-inspector

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true